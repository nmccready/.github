name: release

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node version for release'
        required: false
        type: string
        default: '20.x'
      prerelease:
        description: 'Prerelease tag (e.g. alpha, beta, rc). Empty for stable release.'
        required: false
        type: string
        default: ''
    secrets:
      GH_TOKEN:
        description: 'GitHub token with push access for tags'
        required: true

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # important, must be defined on checkout to kick publish
          token: ${{ secrets.GH_TOKEN }}
          # Full history needed for conventional-changelog to detect breaking changes
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node-version }}

      - name: tag release
        run: |
          # ignore if commit message is chore(release): ...
          if [[ $(git log -1 --pretty=%B) =~ ^chore\(release\):.* ]]; then
            echo "Commit message starts with 'chore(release):', skipping release"
            exit 0
          fi

          git config --local user.email "creadbot@github.com"
          git config --local user.name "creadbot_github"

          npm install

          # Check for breaking changes in commits since last tag
          # Look for feat!:, fix!:, or BREAKING CHANGE in commit messages
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="$LAST_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          # Build version args
          VERSION_ARGS=""
          if [ -n "${{ inputs.prerelease }}" ]; then
            VERSION_ARGS="--prerelease ${{ inputs.prerelease }}"
            echo "Prerelease mode: ${{ inputs.prerelease }}"
          else
            # Check all commits (not just first-parent) for breaking changes
            if git log $RANGE --format="%B" | grep -qE "(^[a-z]+!:|BREAKING CHANGE:)"; then
              echo "Breaking change detected, forcing major version bump"
              VERSION_ARGS="--release-as major"
            fi
          fi

          npx commit-and-tag-version $VERSION_ARGS

          git push
          git push --tags
