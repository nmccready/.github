name: auto-release

on:
  workflow_call:
    inputs:
      generate-notes:
        description: 'Auto-generate release notes from commits'
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Extract version from tag
          echo "Creating release for tag: $TAG"

          NOTES_FLAG=""
          if [ "${{ inputs.generate-notes }}" = "true" ]; then
            NOTES_FLAG="--generate-notes"
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            $NOTES_FLAG \
            --verify-tag
