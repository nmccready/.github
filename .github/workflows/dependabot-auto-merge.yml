# Dependabot Auto-Merge (Reusable)
# Called by individual repos via workflow_call
# Requires the caller to trigger on pull_request_target
#
# Usage in each repo:
#   name: Dependabot Auto-Merge
#   on: pull_request_target
#   permissions:
#     contents: write
#     pull-requests: write
#   jobs:
#     dependabot:
#       uses: nmccready/.github/.github/workflows/dependabot-auto-merge.yml@master

on:
  workflow_call:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-approve
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (merge)
        run: gh pr merge --merge --auto "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
