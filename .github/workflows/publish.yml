name: publish

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node version for publish'
        required: false
        type: string
        # Node 24 (LTS since Oct 2025) bundles npm 11.x out of the box
        # (24.15.0 → 11.12.1), which supports OIDC trusted publishing +
        # --provenance with no extra pin step. Consumers needing a
        # different version can override via `with: node-version: ...`.
        default: '24.x'
      build:
        description: 'Run npm run build before publish'
        required: false
        type: boolean
        default: false
      tag:
        description: 'npm dist-tag (e.g. pre, beta, next). Empty for latest.'
        required: false
        type: string
        default: ''

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC
    steps:
      # Egress allowlist — blocks Shai-Hulud-style exfil (getsession.org, IMDS 169.254.169.254, vault.svc.cluster.local).
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            uploads.github.com:443
            registry.npmjs.org:443
            nodejs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Use Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://registry.npmjs.org'
      # --ignore-scripts blocks transitive postinstall (Shai-Hulud worm vector).
      # Our own publish lifecycle (prepublishOnly/prepack) still runs via `npm publish`.
      - name: Publish to npm
        run: |
          npm ci --ignore-scripts
          ${{ inputs.build && 'npm run build' || 'echo "skipping build"' }}
          npm publish --access public ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}
